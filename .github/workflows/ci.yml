name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes playwright pytest-cov
      - name: Install Chromium (Playwright)
        run: python -m playwright install --with-deps chromium
      - name: Lint (pyflakes)
        run: python -m pyflakes patronaje tests
      - name: Tests (pytest + cobertura)  # incluye render WebGL + simulación del visor 3D
        run: python -m pytest -q --cov=patronaje --cov-report=term-missing
      - name: Smoke — generar patrón talla S + visores
        run: |
          python -m patronaje.cli --size S --output /tmp/ci_out
          python -m patronaje.viewer --output /tmp/ci_out
